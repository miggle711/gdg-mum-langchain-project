<div class="chat-header">
  <div class="chat-header-info">
    <div class="avatar">
      <mat-icon>auto_awesome</mat-icon>
    </div>
    <div class="agent-info">
      <span class="agent-name">Chat Assistant</span>
      <span class="agent-status">Online</span>
    </div>
  </div>
  <button mat-icon-button (click)="onClose()">
    <mat-icon>close</mat-icon>
  </button>
</div>

<mat-divider></mat-divider>

<div class="message-list" #messageList>
  @if (messages.length === 0 && !isLoading) {
    <p class="empty-state">How can I help you today?</p>
  }
  @for (message of messages; track $index) {
    <div class="message" [class.user]="message.role === 'user'" [class.assistant]="message.role === 'assistant'">
      <div class="message-text">{{ message.text }}</div>

      @if (message.role === 'assistant' && message.traceId) {
        <div class="feedback-row">
          <button mat-icon-button class="feedback-btn"
            (click)="rateFeedback($index, true)"
            [disabled]="message.feedback !== undefined"
            aria-label="Good response">
            <mat-icon>{{ message.feedback === true ? 'thumb_up' : 'thumb_up_off_alt' }}</mat-icon>
          </button>
          <button mat-icon-button class="feedback-btn"
            (click)="rateFeedback($index, false)"
            [disabled]="message.feedback !== undefined"
            aria-label="Bad response">
            <mat-icon>{{ message.feedback === false ? 'thumb_down' : 'thumb_down_off_alt' }}</mat-icon>
          </button>
        </div>
      }
    </div>
  }
  @if (isLoading) {
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
  }
</div>

<div class="input-row">
  <mat-form-field appearance="outline" class="input-field">
    <textarea matInput [(ngModel)]="userMessage" placeholder="Write your message…"
      cdkTextareaAutosize cdkAutosizeMinRows="1" cdkAutosizeMaxRows="4"
      maxlength="1000"
      (keydown.enter)="onEnter($event)" [disabled]="isLoading"></textarea>
    <mat-hint align="end">{{ userMessage.length }} / 1000</mat-hint>
  </mat-form-field>
  <button mat-icon-button class="send-btn" (click)="sendMessage()"
    [disabled]="isLoading || !userMessage.trim()">
    <mat-icon>arrow_upward</mat-icon>
  </button>
</div>
