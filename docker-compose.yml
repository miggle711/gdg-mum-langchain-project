services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}

  frontend:
    build: ./frontend/chatbot-ui
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./frontend/chatbot-ui/nginx.conf:/etc/nginx/nginx.conf:ro